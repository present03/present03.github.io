<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ 관리 | 월촌캠핑장</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar" id="admin-sidebar"></aside>

        <main class="admin-main">
            <div class="admin-header">
                <h1>FAQ 관리</h1>
                <p>자주 묻는 질문을 등록하고 삭제합니다.</p>
            </div>

            <section class="admin-panel">
                <h2>FAQ 등록</h2>

                <form id="faq-admin-form" class="admin-form-box">
                    <label for="faq-question">질문</label>
                    <input type="text" id="faq-question" required placeholder="예: 반려동물 동반이 가능한가요?">

                    <label for="faq-answer">답변</label>
                    <textarea id="faq-answer" required placeholder="답변 내용을 입력하세요."></textarea>

                    <div class="admin-btn-row">
                        <button type="submit" class="btn btn-primary">FAQ 등록</button>
                        <a href="faq.html" class="btn btn-outline">FAQ 페이지 보기</a>
                    </div>
                </form>
            </section>

            <section class="admin-panel">
                <h2>등록된 FAQ</h2>

                <table class="admin-table">
                    <thead>
                        <tr>
                            <th style="width:80px;">번호</th>
                            <th>질문</th>
                            <th style="width:120px;">관리</th>
                        </tr>
                    </thead>
                    <tbody id="faq-admin-list"></tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/admin-layout.js"></script>
</body>

</html>
