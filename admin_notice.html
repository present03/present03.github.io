<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 관리 | 월촌캠핑장</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar" id="admin-sidebar"></aside>

        <main class="admin-main">
            <div class="admin-header">
                <h1>공지사항 관리</h1>
                <p>공지사항을 작성하고 관리합니다.</p>
            </div>

            <section class="admin-panel">
                <h2>공지 등록</h2>

                <form id="admin-notice-form" class="admin-form-box">
                    <label for="notice-title">제목</label>
                    <input type="text" id="notice-title" placeholder="공지사항 제목을 입력하세요" required>

                    <label for="notice-content">내용</label>
                    <textarea id="notice-content" placeholder="공지사항 내용을 입력하세요" required></textarea>

                    <div class="admin-check-row">
                        <label>
                            <input type="checkbox" id="notice-fixed">
                            <span>필독 공지로 등록</span>
                        </label>
                    </div>

                    <div class="admin-btn-row">
                        <button type="submit" class="btn btn-primary">공지 등록</button>
                        <a href="notice.html" class="btn btn-outline">공지사항 보기</a>
                    </div>
                </form>
            </section>

            <section class="admin-panel">
                <h2>등록된 공지</h2>

                <table class="admin-table">
                    <thead>
                        <tr>
                            <th style="width:80px;">번호</th>
                            <th>제목</th>
                            <th style="width:150px;">날짜</th>
                            <th style="width:100px;">관리</th>
                        </tr>
                    </thead>
                    <tbody id="admin-notice-list"></tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script src="js/admin-auth.js"></script>
    <script src="js/admin-layout.js"></script>
</body>

</html>
