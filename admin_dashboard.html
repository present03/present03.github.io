<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 메인 | 월촌캠핑장</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar" id="admin-sidebar"></aside>

        <main class="admin-main">
            <div class="admin-header">
                <h1>관리자 메인</h1>
                <p>월촌캠핑장 홈페이지의 예약, 공지사항, 문의글, FAQ를 관리합니다.</p>
            </div>

            <section class="admin-card-grid dashboard-card-grid">
                <div class="admin-card">
                    <h3>전체 예약</h3>
                    <div class="count" id="reservation-total-count">0</div>
                </div>

                <div class="admin-card">
                    <h3>결제대기</h3>
                    <div class="count" id="reservation-waiting-count">0</div>
                </div>

                <div class="admin-card">
                    <h3>예약완료</h3>
                    <div class="count" id="reservation-complete-count">0</div>
                </div>

                <div class="admin-card">
                    <h3>문의글</h3>
                    <div class="count" id="qna-count">0</div>
                </div>
            </section>

            <section class="admin-panel">
                <h2>관리 메뉴</h2>

                <div class="admin-link-grid dashboard-link-grid">
                    <a href="admin_reservation.html" class="admin-link-card">
                        <strong>예약 관리</strong>
                        <span>예약 확인, 결제대기/예약완료 상태 관리</span>
                    </a>

                    <a href="admin_notice.html" class="admin-link-card">
                        <strong>공지사항 관리</strong>
                        <span>공지 등록, 삭제, 필독 공지 설정</span>
                    </a>

                    <a href="admin_qna.html" class="admin-link-card">
                        <strong>문의/Q&A 관리</strong>
                        <span>고객 문의 확인 및 관리자 답변 작성</span>
                    </a>

                    <a href="admin_faq.html" class="admin-link-card">
                        <strong>FAQ 관리</strong>
                        <span>자주 묻는 질문 등록 및 삭제</span>
                    </a>
                </div>
            </section>

            <section class="admin-panel">
                <div class="admin-panel-title-row">
                    <h2>최근 예약</h2>
                    <a href="admin_reservation.html" class="btn btn-outline">예약 전체 보기</a>
                </div>

                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th style="width:90px;">상태</th>
                                <th style="width:120px;">예약자</th>
                                <th style="width:140px;">연락처</th>
                                <th>날짜</th>
                                <th style="width:90px;">구역</th>
                                <th style="width:110px;">금액</th>
                            </tr>
                        </thead>
                        <tbody id="recent-reservation-list"></tbody>
                    </table>
                </div>
            </section>

            <section class="admin-panel">
                <h2>콘텐츠 현황</h2>

                <div class="admin-card-grid dashboard-small-grid">
                    <div class="admin-card">
                        <h3>공지사항</h3>
                        <div class="count small" id="notice-count">0</div>
                    </div>

                    <div class="admin-card">
                        <h3>FAQ</h3>
                        <div class="count small" id="faq-count">0</div>
                    </div>

                    <div class="admin-card">
                        <h3>전체 문의글</h3>
                        <div class="count small" id="qna-total-count">0</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const notices = JSON.parse(localStorage.getItem('camping_notices')) || [];
        const qnaPosts = JSON.parse(localStorage.getItem('camping_qna_posts')) || [];
        const faqs = JSON.parse(localStorage.getItem('camping_faqs')) || [];
        const reservations = JSON.parse(localStorage.getItem('total_reservations')) || [];

        const waitingReservations = reservations.filter(item => item.status === '결제대기');
        const completeReservations = reservations.filter(item => item.status === '예약완료');

        document.getElementById('reservation-total-count').innerText = reservations.length;
        document.getElementById('reservation-waiting-count').innerText = waitingReservations.length;
        document.getElementById('reservation-complete-count').innerText = completeReservations.length;

        document.getElementById('notice-count').innerText = notices.length;
        document.getElementById('qna-count').innerText = qnaPosts.length;
        document.getElementById('qna-total-count').innerText = qnaPosts.length;
        document.getElementById('faq-count').innerText = faqs.length;

        function escapeHtml(text) {
            return String(text || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function getStatusClass(status) {
            if (status === '예약완료') return 'complete';
            if (status === '취소됨' || status === '자동취소') return 'cancel';
            return 'waiting';
        }

        const recentList = document.getElementById('recent-reservation-list');

        const recentReservations = [...reservations]
            .sort((a, b) => Number(b.bookedAt || 0) - Number(a.bookedAt || 0))
            .slice(0, 5);

        if (recentReservations.length === 0) {
            recentList.innerHTML = `
                <tr>
                    <td colspan="6">최근 예약 내역이 없습니다.</td>
                </tr>
            `;
        } else {
            recentList.innerHTML = recentReservations.map(reservation => `
                <tr>
                    <td>
                        <span class="admin-status ${getStatusClass(reservation.status)}">
                            ${escapeHtml(reservation.status || '결제대기')}
                        </span>
                    </td>
                    <td>${escapeHtml(reservation.name)}</td>
                    <td>${escapeHtml(reservation.phone)}</td>
                    <td class="left">${escapeHtml(reservation.date)}</td>
                    <td>${escapeHtml(reservation.site)}</td>
                    <td>${escapeHtml(reservation.price)}</td>
                </tr>
            `).join('');
        }
    </script>

    <script src="js/admin-auth.js"></script>
    <script src="js/admin-layout.js"></script>
</body>

</html>
